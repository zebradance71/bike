name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build renderer + electron
        run: npm run build

      - name: Verify pack-tools import (smoke)
        run: py -3 -c "import sys; sys.path.insert(0,'scripts/pack-tools'); import frame_import_common, resolve_paths; print('pack-tools ok')"
