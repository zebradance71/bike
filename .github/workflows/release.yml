name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "full = build + GitHub Release + itch | itch-only = re-push existing zip"
        required: true
        default: full
        type: choice
        options:
          - full
          - itch-only
      release_tag:
        description: "Tag only — e.g. v0.1.6 (do NOT paste 'release_tag:' prefix)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'push' || inputs.mode == 'full'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'.Trim()
          } else {
            $tag = '${{ inputs.release_tag }}'.Trim()
            # Users sometimes paste "release_tag: v0.1.6" from docs — strip label.
            $tag = $tag -replace '^(?i)(release_tag|elease_tag)\s*:\s*', ''
            $tag = $tag.Trim()
          }
          if (-not $tag.StartsWith('v')) { $tag = "v$tag" }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw @"
          Invalid release tag '$tag'.
          Enter tag only, e.g. v0.1.6 — not 'release_tag: v0.1.6'.
          "@
          }
          "name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release tag: $tag"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: py -3 -m pip install Pillow setuptools

      - name: Install npm deps
        run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Build + package
        run: npm run dist

      - name: Verify packaged layout
        run: pwsh -NoProfile -File scripts/verify-dist.ps1

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.rel.outputs.name }}
          files: |
            dist-app/*-setup-x64.exe
            dist-app/*-portable-x64.exe
            dist-app/*-win64.zip
            dist-app/itch/*-itch.zip
          generate_release_notes: true

      - name: Upload dist-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-app
          path: |
            dist-app/*-setup-x64.exe
            dist-app/*-portable-x64.exe
            dist-app/*-win64.zip
          if-no-files-found: error

      - name: Upload itch zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-app-itch
          path: dist-app/itch/*-itch.zip
          if-no-files-found: error

  push-itch:
    needs: build
    if: |
      always() &&
      (needs.build.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'itch-only')) &&
      (vars.ITCH_BUTLER_TARGET != '' || (vars.ITCH_USER != '' && vars.ITCH_GAME != ''))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: rel
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'.Trim()
          } else {
            $tag = '${{ inputs.release_tag }}'.Trim()
            $tag = $tag -replace '^(?i)(release_tag|elease_tag)\s*:\s*', ''
            $tag = $tag.Trim()
          }
          if (-not $tag.StartsWith('v')) { $tag = "v$tag" }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag '$tag'. Enter tag only, e.g. v0.1.6."
          }
          "name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Release tag: $tag"

      - name: Download release artifacts (build)
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: dist-app
          path: dist-app

      - name: Download itch zip (build artifact)
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: dist-app-itch
          path: dist-app/itch

      - name: Download dist-app (GitHub Release)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'itch-only'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.rel.outputs.name }}".Trim()

          $branding = Get-Content branding.json -Raw | ConvertFrom-Json
          $version = $tag -replace '^v', ''

          $zipName = "$($branding.productName)-$version-win64-itch.zip"
          New-Item -ItemType Directory -Force -Path dist-app/itch | Out-Null
          $out = Join-Path dist-app/itch $zipName
          $uri = "https://github.com/${{ github.repository }}/releases/download/$tag/$zipName"
          $fallback = "$($branding.productName)-$version-win64.zip"

          Write-Host "[itch-only] GET $zipName (fallback: $fallback)"
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/octet-stream" }
          try {
            Invoke-WebRequest -Uri $uri -Headers $headers -OutFile $out
          } catch {
            Write-Host "[itch-only] itch wrapper zip missing, using github zip (flat on itch)"
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/$tag/$fallback" -Headers $headers -OutFile (Join-Path dist-app $fallback)
            $out = Join-Path dist-app $fallback
          }
          if (-not (Test-Path $out)) { throw "Download failed: $out" }
          Write-Host "[itch-only] saved $out ($((Get-Item $out).Length) bytes)"

      - name: Push to itch.io
        continue-on-error: true
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          if (-not $env:BUTLER_API_KEY) {
            Write-Host "::warning::BUTLER_API_KEY secret is missing — skipping itch.io push"
            exit 0
          }

          choco install butler -y

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $branding = Get-Content branding.json -Raw | ConvertFrom-Json

          $tag = "${{ steps.rel.outputs.name }}".Trim()
          $version = $tag -replace '^v', ''
          $setup = "dist-app/$($branding.productName)-$version-setup-x64.exe"
          $zip = "dist-app/itch/$($branding.productName)-$version-win64-itch.zip"
          if (-not (Test-Path $zip)) {
            $zip = "dist-app/$($branding.productName)-$version-win64.zip"
          }

          if (-not (Test-Path $zip)) {
            Write-Host "dist-app contents:"
            Get-ChildItem dist-app -Recurse -ErrorAction SilentlyContinue
            throw "Artifact not found: $zip"
          }

          $target = "${{ vars.ITCH_BUTLER_TARGET }}".Trim()
          if ([string]::IsNullOrWhiteSpace($target)) {
            $user = "${{ vars.ITCH_USER }}".Trim().ToLower()
            $game = "${{ vars.ITCH_GAME }}".Trim().ToLower()
            $channel = "${{ vars.ITCH_CHANNEL }}".Trim().ToLower()
            if ([string]::IsNullOrWhiteSpace($channel)) { $channel = "windows" }

            if ($user -match '[/:]' -or $game -match '[/:]') {
              throw @"
          ITCH_USER / ITCH_GAME must be plain slugs only.
            ITCH_USER = itch.io profile name (from https://itch.io/profile/NAME)
            ITCH_GAME = game slug (from https://itch.io/USER/GAME-SLUG)
          Or set ITCH_BUTLER_TARGET = user/game:channel in one variable.
          "@
            }

            $target = "$user/${game}:$channel"
          }

          Write-Host "[butler] push setup -> $target"
          if (Test-Path $setup) {
            butler push $setup $target
          } else {
            Write-Host "::warning::setup exe not found: $setup"
          }

          Write-Host "[butler] push zip -> $target"
          butler push $zip $target
