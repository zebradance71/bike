<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" width="48" height="56">
  <title>Concept A  Round Mochi</title>
  <!-- ground shadow -->
  <ellipse cx="24" cy="54" rx="14" ry="2" fill="#1a1a2e" opacity="0.12"/>
  <!-- body -->
  <path d="M16 28 L32 28 L30 42 L18 42 Z" fill="#2a2a35"/>
  <!-- legs -->
  <rect x="17" y="41" width="6" height="8" rx="2" fill="#1e1e28"/>
  <rect x="25" y="41" width="6" height="8" rx="2" fill="#1e1e28"/>
  <!-- hood / head -->
  <ellipse cx="24" cy="18" rx="13" ry="14" fill="#232330"/>
  <ellipse cx="24" cy="19" rx="11" ry="12" fill="#2d2d3a"/>
  <!-- headband -->
  <rect x="12" y="12" width="24" height="4" rx="2" fill="#c45c3e"/>
  <rect x="14" y="13" width="20" height="2" rx="1" fill="#d46a4a" opacity="0.5"/>
  <!-- eyes (tiny glow) -->
  <circle cx="19" cy="20" r="1.5" fill="#a8d4e6" opacity="0.9"/>
  <circle cx="29" cy="20" r="1.5" fill="#a8d4e6" opacity="0.9"/>
  <!-- katana (subtle) -->
  <line x1="33" y1="30" x2="42" y2="36" stroke="#3d4555" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="31" y="28" width="3" height="4" rx="0.5" fill="#4a4a58"/>
</svg>
