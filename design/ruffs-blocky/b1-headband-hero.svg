<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 28" shape-rendering="crispEdges">
  <title>B1 Headband Hero  idle</title>
  <!-- Strong headband-first ninja icon. 24px priority -->
  <rect x="8" y="27" width="8" height="1" fill="#0c0c10" opacity="0.3"/>
  <!-- headband (hero) -->
  <rect x="4" y="5" width="16" height="3" fill="#c85848"/>
  <rect x="5" y="6" width="14" height="1" fill="#d86858" opacity="0.5"/>
  <!-- hood -->
  <rect x="5" y="8" width="14" height="2" fill="#14141c"/>
  <rect x="4" y="10" width="16" height="5" fill="#14141c"/>
  <rect x="5" y="15" width="14" height="1" fill="#0c0c10"/>
  <!-- eyes (2 dots, wide) -->
  <rect x="7" y="12" width="2" height="2" fill="#8aa8b8"/>
  <rect x="15" y="12" width="2" height="2" fill="#8aa8b8"/>
  <!-- body -->
  <rect x="8" y="16" width="8" height="5" fill="#1e1e28"/>
  <!-- legs -->
  <rect x="8" y="21" width="3" height="5" fill="#0c0c10"/>
  <rect x="13" y="21" width="3" height="5" fill="#0c0c10"/>
</svg>
