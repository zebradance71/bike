<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Ninja2 Block Watcher</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        width: 240px;
        margin: 0;
        padding: 12px 14px;
        background: Canvas;
        color: CanvasText;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px;
        opacity: 0.7;
      }
      .state {
        font-size: 18px;
        font-weight: 600;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(127, 127, 127, 0.12);
      }
      .state.on {
        background: rgba(220, 80, 80, 0.18);
        color: #c33;
      }
      .state.off {
        background: rgba(80, 180, 100, 0.16);
        color: #2a7;
      }
      .row {
        margin: 6px 0;
        font-size: 12px;
        line-height: 1.4;
        word-break: break-all;
      }
      .row b {
        font-weight: 600;
      }
      .actions {
        margin-top: 10px;
        display: flex;
        gap: 6px;
      }
      button {
        flex: 1;
        font-size: 12px;
        padding: 5px 8px;
        cursor: pointer;
      }
      a {
        color: inherit;
        opacity: 0.7;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>Ninja2 Block Watcher</h1>
    <div id="state" class="state">…</div>
    <div class="row"><b>Active host:</b> <span id="host">—</span></div>
    <div class="row"><b>Port:</b> <span id="port">—</span></div>
    <div class="row"><b>Hosts:</b> <span id="hosts">—</span></div>
    <div class="actions">
      <button id="recheck">Re-check</button>
      <button id="open-options">Options</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
