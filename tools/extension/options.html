<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Ninja2 Block Watcher Options</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        min-width: 360px;
        background: Canvas;
        color: CanvasText;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        margin: 12px 0 4px;
        font-weight: 600;
        font-size: 13px;
      }
      textarea {
        width: 100%;
        height: 140px;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 12px;
        padding: 6px 8px;
        box-sizing: border-box;
        resize: vertical;
      }
      input[type="number"] {
        width: 90px;
        padding: 4px 6px;
        font-size: 13px;
      }
      .help {
        color: #777;
        font-size: 11px;
        margin: 4px 0 0;
        line-height: 1.4;
      }
      .row {
        margin: 8px 0;
      }
      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }
      button {
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      .status {
        font-size: 12px;
        color: #2a7;
        min-height: 1em;
      }
      .status.error {
        color: #c33;
      }
      code {
        background: rgba(127, 127, 127, 0.15);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Ninja2 Block Watcher</h1>

    <div class="row">
      <label for="hosts">Blocked hosts (one per line)</label>
      <textarea
        id="hosts"
        spellcheck="false"
        placeholder="x.com
twitter.com
youtube.com"
      ></textarea>
      <p class="help">
        Suffix match. <code>x.com</code> matches <code>x.com</code> and
        <code>www.x.com</code>. Lines starting with <code>#</code> are ignored.
      </p>
    </div>

    <div class="row">
      <label for="port">Companion port</label>
      <input type="number" id="port" min="1" max="65535" />
      <p class="help">
        Default <code>7727</code>. Override with the
        <code>NINJA_BLOCK_PORT</code> env var when starting the desktop app.
      </p>
    </div>

    <div class="row">
      <label for="token">Block bridge token</label>
      <input type="password" id="token" autocomplete="off" spellcheck="false" style="width:100%;box-sizing:border-box;padding:6px 8px;font-family:ui-monospace,Consolas,monospace;font-size:12px;" />
      <p class="help">
        Copy from Ninja2 tray → <code>Copy block bridge token</code>. Required
        for POST <code>/block</code> (state changes).
      </p>
    </div>

    <div class="actions">
      <button id="save">Save</button>
      <button id="ping">Test ping</button>
      <span class="status" id="status" aria-live="polite"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
